<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prenotazione Transfer - Cooperativa Taxi Lecce</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
margin:0;
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
}

header img{
width:180px;
max-width:80%;
}


.container{
max-width:600px;
margin:30px auto;
padding:20px;
}


.card{
background:#1c1c1c;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px rgba(255,140,0,0.15);
}


h1{
text-align:center;
font-size:26px;
}


.subtitle{
text-align:center;
color:#ccc;
margin-bottom:25px;
}


label{
display:block;
margin-top:15px;
font-weight:600;
}


input, textarea{

width:100%;
margin-top:7px;
padding:14px;
border-radius:10px;
border:none;
background:#2b2b2b;
color:white;
font-size:15px;

}


textarea{
resize:none;
height:100px;
}


.info{

background:#111;
border-radius:12px;
padding:15px;
margin-bottom:20px;
border:1px solid #333;

}


.price{

color:#ff8c00;
font-size:24px;
font-weight:700;

}


button{

width:100%;
margin-top:25px;
padding:15px;
border:none;
border-radius:12px;
background:#ff8c00;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;

}


button:hover{

background:#ff9f2d;

}


</style>


</head>


<body>


<header>

<img src="logo.png" alt="Cooperativa Taxi Lecce">

</header>



<div class="container">


<div class="card">


<h1>Prenota il tuo Transfer</h1>


<p class="subtitle">
Compila i dati per completare la richiesta
</p>



<div class="info">

<p>
<b>Partenza:</b><br>
<span id="partenza"></span>
</p>


<p>
<b>Arrivo:</b><br>
<span id="arrivo"></span>
</p>


<p>
<b>Preventivo:</b><br>

<span class="price" id="prezzo"></span>

</p>


</div>




<label>Nome e cognome</label>

<input id="nome" placeholder="Inserisci nome e cognome">



<label>Numero di telefono</label>

<input id="telefono" type="tel" placeholder="Inserisci numero di telefono">



<label>Data del servizio</label>

<input id="data" type="date">



<label>Ora del servizio</label>

<input id="ora" type="time">



<label>Numero passeggeri</label>

<input id="passeggeri" type="number" min="1" value="1">



<label>Numero bagagli</label>

<input id="bagagli" type="number" min="0" value="0">



<label>Numero volo (se disponibile)</label>

<input id="volo" placeholder="Esempio: FR4982">



<label>Note aggiuntive</label>

<textarea id="note" placeholder="Eventuali richieste particolari"></textarea>



<button onclick="inviaPrenotazione()">

INVIA PRENOTAZIONE

</button>



</div>


</div>



<script>


const parametri=new URLSearchParams(window.location.search);


document.getElementById("partenza").innerHTML=
parametri.get("partenza") || "-";


document.getElementById("arrivo").innerHTML=
parametri.get("arrivo") || "-";


document.getElementById("prezzo").innerHTML=
parametri.get("prezzo") + " €" || "-";




function inviaPrenotazione(){


let messaggio=

`🚕 NUOVA PRENOTAZIONE TRANSFER

📍 Partenza:
${document.getElementById("partenza").innerText}

📍 Arrivo:
${document.getElementById("arrivo").innerText}

💰 Preventivo:
${document.getElementById("prezzo").innerText}


👤 Nome:
${document.getElementById("nome").value}


📞 Telefono:
${document.getElementById("telefono").value}


📅 Data:
${document.getElementById("data").value}


⏰ Ora:
${document.getElementById("ora").value}


👥 Passeggeri:
${document.getElementById("passeggeri").value}


🧳 Bagagli:
${document.getElementById("bagagli").value}


✈️ Numero volo:
${document.getElementById("volo").value}


📝 Note:
${document.getElementById("note").value}`;



let numeroWhatsapp="393286714428";


window.open(

"https://wa.me/"+numeroWhatsapp+"?text="+encodeURIComponent(messaggio),

"_blank"

);


}



</script>



</body>

</html>
